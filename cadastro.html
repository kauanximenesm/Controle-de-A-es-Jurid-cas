<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | CJuris</title>
    <link rel="stylesheet" href="Css/global.css">
    <link rel="stylesheet" href="Css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <img src="Assets/favicon.ico" alt="Logo CJuris" class="login-logo">
            <h2>Criar Nova Conta</h2>
            
            <form id="formCadastro">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
                <div class="input-group">
                    <label for="login">E-mail (Login)</label>
                    <input type="email" id="login" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>
                
                <button type="submit" class="btn-login">Finalizar Cadastro</button>
            </form>

            <div class="login-footer">
                <p>Já tem uma conta?</p>
                <a href="login.html" class="back-link" style="color: #3498db; font-weight: bold;">Fazer Login</a>
            </div>
        </div>
    </div>

    <script src="Js/cadastro.js"></script>
</body>
</html>
